services:
  app:
    image: node:20-alpine
    container_name: erp_dev
    working_dir: /workspace
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    environment:
      DATABASE_URL: postgresql://nubgha_user:123456@postgres:5432/erp_system
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev_jwt_secret
      JWT_EXPIRES_IN: 7d
      PORT: 3000
      NODE_ENV: development
      VITE_API_URL: http://localhost:3000/api
    ports:
      - "3000:3000"
      - "4200:4200"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    container_name: erp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nubgha_user
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: erp_system
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: erp_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: